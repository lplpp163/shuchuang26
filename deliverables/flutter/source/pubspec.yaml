name: hometongue_tags
description: 傳家話－說一句・演成我們家的故事之本機資料優先 Flutter 原型。
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.6
  cryptography: ^2.7.0
  flutter_tts: ^4.2.5
  image_picker: ^1.1.2
  http: ^1.6.0
  idb_shim: ^2.9.5
  just_audio: ^0.9.42
  mobile_scanner: ^6.0.2
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  record: 5.2.1
  shared_preferences: ^2.3.4
  speech_to_text: ^7.4.0
  url_launcher: ^6.3.2
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# record 5.2.1's loose Linux constraint can otherwise resolve to 0.7.2,
# which is incompatible with record_platform_interface 1.6.0 at build time.
dependency_overrides:
  record_linux: 1.3.1

flutter:
  uses-material-design: true
  fonts:
    - family: NotoSansTC
      fonts:
        - asset: assets/fonts/NotoSansTC-VF.ttf
  assets:
    - assets/audio/
    - assets/images/family-meal-lesson.webp
    - assets/images/family-kitchen-game-v2.webp
    - assets/images/family-morning-game-v1.webp
    - assets/images/family-homecoming-theater-v2.png
    - assets/images/family-mealtime-theater-v2.png
    - assets/images/family-garden-theater-v1.png
    - assets/images/family-bedtime-theater-v1.png
    - assets/images/family-stage-duo-v1.png
    - assets/images/provenance_manifest.json
