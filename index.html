<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="./">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="傳家話－一句話，一個故事，一份傳承。">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="傳家話">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>傳家話</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // Builds before 2026-07-13 registered Flutter's deprecated cache-first
    // service worker. Remove only this app's scope, clear its old Flutter
    // caches, then reload once so an installed/previously-opened copy cannot
    // keep serving an obsolete main.dart.js.
    (() => {
      const scopePath = new URL('.', document.baseURI).pathname;
      const cleanupKey = `hometongue-sw-cleanup-v1:${scopePath}`;

      const loadFlutter = () => {
        const script = document.createElement('script');
        script.src = 'flutter_bootstrap.js';
        script.async = true;
        document.body.appendChild(script);
      };

      const cleanLegacyWorker = async () => {
        if (!('serviceWorker' in navigator)) return false;
        const registrations = await navigator.serviceWorker.getRegistrations();
        const matching = registrations.filter(
          (registration) => new URL(registration.scope).pathname === scopePath,
        );
        if (matching.length === 0) return false;

        await Promise.all(matching.map((registration) => registration.unregister()));
        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(
            names
              .filter((name) => name.startsWith('flutter-'))
              .map((name) => caches.delete(name)),
          );
        }

        if (
          navigator.serviceWorker.controller &&
          sessionStorage.getItem(cleanupKey) !== 'done'
        ) {
          sessionStorage.setItem(cleanupKey, 'done');
          location.reload();
          return true;
        }
        return false;
      };

      cleanLegacyWorker()
        .then((reloading) => {
          if (!reloading) loadFlutter();
        })
        .catch(loadFlutter);
    })();
  </script>
</body>
</html>
